name: Flutter Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Flutter action

        uses: subosito/flutter-action@v2.23.0
        with:
          channel: "stable"
          cache: true
